x-backend: &backend_defaults
  image: diploma-backend:dev
  build:
    context: .
    dockerfile: Dockerfile

x-docker-hosts: &docker_hosts
  DB_HOST: db
  DB_PORT: 5432
  REDIS_HOST: redis

services:
  db:
    image: postgres:16-alpine
    container_name: testing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-testing}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-testing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: testing_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c "
        if [ -n \"$REDIS_PASSWORD\" ]; then
          redis-server --requirepass $REDIS_PASSWORD
        else
          redis-server
        fi
      "
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    volumes:
      - redis_data:/data

  # FastAPI Application (HTTP API)
  api:
    <<: *backend_defaults
    container_name: testing_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *docker_hosts
      ML_API_URL: ${ML_API_URL:-http://ml-api:8000}
      ML_API_URL_KK: ${ML_API_URL_KK:-}
      APP_NAME: ${APP_NAME:-Testing}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Telegram Bot (separate process)
  bot:
    <<: *backend_defaults
    container_name: testing_bot
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *docker_hosts
      APP_NAME: ${APP_NAME:-Testing}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./src:/app/src
    command: python -m src.bot_main

  ml-api:
    build:
      context: ../diploma-ml-api
      dockerfile: Dockerfile
    container_name: testing_ml_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      <<: *docker_hosts
      APP_NAME: ${APP_NAME:-Testing-ML}
      HF_TOKEN: ${HF_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - hf_cache:/app/cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ../diploma-front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        # Baked into the client at build time; use NEXT_PUBLIC_* or fall back to backend GOOGLE_CLIENT_ID
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: testing_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_BASE_URL=http://api:8000
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  stripe-listener:
    image: stripe/stripe-cli:latest
    container_name: testing_stripe_listener
    profiles:
      - tools
    env_file: .env
    command:
      - listen
      - --api-key
      - ${STRIPE_SECRET_KEY}
      - --forward-to
      - ${STRIPE_FORWARD_TO:-https://langproofai.online/api/v1/billing/webhook}
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  hf_cache:
    driver: local
